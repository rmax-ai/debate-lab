[project]
name = "debate-orchestrator"
version = "0.1.0"
description = "Debate lifecycle engine for DebateLab"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.10.0",
    "debate-evidence",
    "debate-tracing",
    "debate-harnesses",
    "debate-tools",
]

[tool.uv.sources]
debate-evidence = { path = "../evidence", editable = true }
debate-tracing = { path = "../tracing", editable = true }
debate-harnesses = { path = "../harnesses", editable = true }
debate-tools = { path = "../tools", editable = true }

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
]
deepseek = [
    "debate-harnesses[deepseek]",
]
gemini = [
    "debate-harnesses[gemini]",
]
real = [
    "debate-harnesses[real]",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/debate_orchestrator"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "RUF"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
