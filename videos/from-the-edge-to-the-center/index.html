<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
    #root { position: relative; overflow: hidden; }
    .img-fit { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-clip { position: absolute; overflow: hidden; }
    #grain {
      position: absolute; inset: 0; pointer-events: none; mix-blend-mode: overlay; opacity: 0.08;
    }
    #vignette {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
    }
    .title-card {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #e8d5b7;
      text-align: center; padding: 0 200px;
    }
    .title-card h1 { font-size: 52px; font-weight: 300; letter-spacing: 0.12em; margin: 0 0 20px 0; }
    .title-card h2 { font-size: 22px; font-weight: 300; letter-spacing: 0.18em; opacity: 0.65; margin: 0; }
  </style>
</head>
<body>

<div id="root" data-composition-id="from-the-edge"
     data-start="0" data-duration="49" data-width="1920" data-height="1080"
     style="width:1920px;height:1080px;background:#050505">

  <!-- AUDIO: Background music -->
  <audio id="music" class="clip" data-start="0" data-track-index="0"
         data-volume="0.22" src="assets/music-50s.mp3" preload="auto"></audio>

  <!-- AUDIO: Narration segments -->
  <audio id="nar-s01" class="clip" data-start="0" data-duration="9.32" data-track-index="1"
         data-volume="0.85" src="assets/narration-s01.mp3" preload="auto"></audio>
  <audio id="nar-s02" class="clip" data-start="9.32" data-duration="8.44" data-track-index="1"
         data-volume="0.85" src="assets/narration-s02.mp3" preload="auto"></audio>
  <audio id="nar-s03" class="clip" data-start="17.76" data-duration="8.68" data-track-index="1"
         data-volume="0.85" src="assets/narration-s03.mp3" preload="auto"></audio>
  <audio id="nar-s04" class="clip" data-start="26.44" data-duration="7.20" data-track-index="1"
         data-volume="0.85" src="assets/narration-s04.mp3" preload="auto"></audio>
  <audio id="nar-s05" class="clip" data-start="33.64" data-duration="7.12" data-track-index="1"
         data-volume="0.85" src="assets/narration-s05.mp3" preload="auto"></audio>
  <audio id="nar-s06" class="clip" data-start="40.76" data-duration="5.32" data-track-index="1"
         data-volume="0.85" src="assets/narration-s06.mp3" preload="auto"></audio>

  <!-- SHOT 1: Childhood album (0–10s) — warm, faded, slow push-in -->
  <div id="shot1-a" class="clip img-clip" data-start="0" data-duration="10"
       data-track-index="3"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s1-img1" class="img-fit" src="assets/childhood-album.jpg"
         style="transform:scale(1.05);transform-origin:50% 50%;">
  </div>
  <div id="shot1-b" class="clip img-clip" data-start="4.5" data-duration="5.5"
       data-track-index="4"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s1-img2" class="img-fit" src="assets/siblings.jpg"
         style="transform:scale(1.08);transform-origin:55% 45%;">
  </div>

  <!-- SHOT 2: Child detail (9.5–18.5s) — siblings close, worn walls, sun -->
  <div id="shot2-a" class="clip img-clip" data-start="9.5" data-duration="9"
       data-track-index="5"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s2-img1" class="img-fit" src="assets/siblings.jpg"
         style="transform:scale(1.25);transform-origin:45% 40%;">
  </div>

  <!-- SHOT 3: Transition / Distance (17.5–27s) — black screen, map motion -->
  <div id="shot3-bg" class="clip" data-start="17.5" data-duration="9.5"
       data-track-index="2"
       style="position:absolute;left:0;top:0;width:1920px;height:1080px;background:#050505;"></div>
  <div id="shot3-map" class="clip" data-start="18.5" data-duration="8"
       data-track-index="3"
       style="position:absolute;left:0;top:0;width:1920px;height:1080px;opacity:0.15;">
    <div style="position:absolute;left:0;top:0;width:100%;height:100%;
      background:
        radial-gradient(circle at 30% 75%, rgba(180,160,120,0.6) 0%, transparent 40%),
        radial-gradient(circle at 70% 25%, rgba(140,160,180,0.5) 0%, transparent 35%);
      "></div>
    <div style="position:absolute;left:25%;top:70%;width:8px;height:8px;background:#c4a860;border-radius:50%;box-shadow:0 0 12px #c4a860;"></div>
    <div style="position:absolute;left:68%;top:22%;width:8px;height:8px;background:#8ca8c8;border-radius:50%;box-shadow:0 0 12px #8ca8c8;"></div>
    <div style="position:absolute;left:28%;top:68%;width:40%;height:2px;background:linear-gradient(90deg,rgba(196,168,96,0.6),rgba(140,168,200,0.4));transform:rotate(-15deg);transform-origin:0 0;"></div>
  </div>

  <!-- SHOT 4: Amsterdam portraits (26–34.5s) — sharper cuts, modern -->
  <div id="shot4-a" class="clip img-clip" data-start="26.5" data-duration="4"
       data-track-index="6"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s4-img1" class="img-fit" src="assets/amsterdam-suit.jpg"
         style="transform:scale(1.06);transform-origin:48% 42%;">
  </div>
  <div id="shot4-b" class="clip img-clip" data-start="29.5" data-duration="5"
       data-track-index="4"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s4-img2" class="img-fit" src="assets/amsterdam-stairs.jpg"
         style="transform:scale(1.08);transform-origin:40% 48%;">
  </div>

  <!-- SHOT 5: Hero / beach + portrait (33–41.5s) — slower, wider, mythic -->
  <div id="shot5-a" class="clip img-clip" data-start="33" data-duration="5"
       data-track-index="7"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s5-img1" class="img-fit" src="assets/beach-dog.jpg"
         style="transform:scale(1.04);transform-origin:50% 55%;">
  </div>
  <div id="shot5-b" class="clip img-clip" data-start="37.5" data-duration="4"
       data-track-index="4"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s5-img2" class="img-fit" src="assets/portrait-linen.jpg"
         style="transform:scale(1.1);transform-origin:50% 38%;">
  </div>

  <!-- SHOT 6: Final portrait (40–49s) — direct gaze, fade to black + title -->
  <div id="shot6" class="clip img-clip" data-start="40" data-duration="9"
       data-track-index="3"
       style="left:0;top:0;width:1920px;height:1080px;">
    <img id="s6-img1" class="img-fit" src="assets/portrait-linen.jpg"
         style="transform:scale(1.15);transform-origin:50% 35%;">
  </div>

  <!-- Title card overlay (46–49s) -->
  <div id="title-card" class="clip title-card" data-start="45.5" data-duration="3.5"
       data-track-index="5">
    <h1>FROM THE OUTSKIRTS TO AMSTERDAM</h1>
    <h2>A LIFE STILL BECOMING</h2>
  </div>

  <!-- FILM GRAIN + VIGNETTE -->
  <div id="grain" class="clip" data-start="0" data-duration="49" data-track-index="20">
    <svg width="100%" height="100%" style="position:absolute;inset:0">
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
        <feBlend in="SourceGraphic" mode="multiply"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noise)" opacity="0.6"/>
    </svg>
  </div>
  <div id="vignette" class="clip" data-start="0" data-duration="49" data-track-index="21"></div>

  <!-- GSAP TIMELINE -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    // SHOT 1: Ken Burns on childhood images
    // childhood-album: slow push-in
    tl.fromTo("#s1-img1", { scale: 1.05 }, { scale: 1.18, duration: 9.5, ease: "none" }, 0);
    tl.fromTo("#s1-img1", { xPercent: 0, yPercent: 0 }, { xPercent: -3, yPercent: -2, duration: 9.5, ease: "none" }, 0);
    // siblings fade in
    tl.fromTo("#shot1-b", { opacity: 0 }, { opacity: 1, duration: 0.7, ease: "power2.out" }, 4.5);
    tl.fromTo("#s1-img2", { scale: 1.08 }, { scale: 1.22, duration: 5.5, ease: "none" }, 4.5);

    // SHOT 2: siblings detail — push-in on faces
    tl.fromTo("#s2-img1", { scale: 1.25 }, { scale: 1.38, duration: 9, ease: "none" }, 9.5);
    tl.fromTo("#s2-img1", { xPercent: 0, yPercent: 0 }, { xPercent: -4, yPercent: -5, duration: 9, ease: "none" }, 9.5);
    // shot2 fades in
    tl.fromTo("#shot2-a", { opacity: 0 }, { opacity: 1, duration: 0.7, ease: "power2.in" }, 9.5);

    // SHOT 3: Black transition — map dot moves
    tl.fromTo("#shot3-map", { opacity: 0 }, { opacity: 0.15, duration: 2, ease: "power2.out" }, 18.5);

    // SHOT 4: Amsterdam — suit, then stairs
    tl.fromTo("#shot4-a", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.in" }, 26.5);
    tl.fromTo("#s4-img1", { scale: 1.06 }, { scale: 1.15, duration: 4, ease: "none" }, 26.5);
    tl.fromTo("#s4-img1", { xPercent: 0, yPercent: 0 }, { xPercent: 3, yPercent: -3, duration: 4, ease: "none" }, 26.5);
    // stairs
    tl.fromTo("#shot4-b", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.in" }, 29.5);
    tl.fromTo("#s4-img2", { scale: 1.08 }, { scale: 1.2, duration: 5, ease: "none" }, 29.5);
    tl.fromTo("#s4-img2", { xPercent: -2, yPercent: 2 }, { xPercent: 0, yPercent: -3, duration: 5, ease: "none" }, 29.5);

    // SHOT 5: Beach + portrait — slow, mythic
    tl.fromTo("#shot5-a", { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "power2.in" }, 33);
    tl.fromTo("#s5-img1", { scale: 1.04 }, { scale: 1.12, duration: 5, ease: "none" }, 33);
    tl.fromTo("#s5-img1", { xPercent: 0, yPercent: 0 }, { xPercent: 2, yPercent: -4, duration: 5, ease: "none" }, 33);
    // portrait
    tl.fromTo("#shot5-b", { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "power2.in" }, 37.5);
    tl.fromTo("#s5-img2", { scale: 1.1 }, { scale: 1.18, duration: 4, ease: "none" }, 37.5);

    // SHOT 6: Final portrait — slow zoom to eyes, then fade to black
    tl.fromTo("#shot6", { opacity: 0 }, { opacity: 1, duration: 1, ease: "power2.in" }, 40);
    tl.fromTo("#s6-img1", { scale: 1.15 }, { scale: 1.28, duration: 6, ease: "none" }, 40);
    tl.fromTo("#s6-img1", { xPercent: 0, yPercent: 0 }, { xPercent: 0, yPercent: -6, duration: 6, ease: "none" }, 40);
    // fade shot6 to black starting at 44.5
    tl.to("#shot6", { opacity: 0, duration: 1.5, ease: "power2.in" }, 44.5);

    // Title card fades in
    tl.fromTo("#title-card", { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "power2.out" }, 45.5);
    tl.to("#title-card", { opacity: 0, duration: 0.6, ease: "power2.in" }, 48.4);

    window.__timelines = window.__timelines || {};
    window.__timelines["from-the-edge"] = tl;
  </script>
</div>

</body>
</html>
